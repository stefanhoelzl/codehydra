name: Build
on:
  push:
    branches: [main]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage
            name: linux-x64
          - os: macos-13 # Intel macOS (free tier)
            target: x86_64-apple-darwin
            bundle: app
            name: darwin-x64
          - os: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            bundle: app
            name: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            name: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install
      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --bundles ${{ matrix.bundle }} --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: codehydra-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
