name: Build code-server for Windows

# Builds a COMPLETE, standalone code-server for Windows from source, mirroring
# coder's own release pipeline (.github/workflows/release.yaml upstream) but
# targeted at win32-x64.
#
# Why from source (and not from the published package.tar.gz)?
#   coder's release runs one source build and emits two artifacts:
#     - `npm run release`                 -> package.tar.gz   (KEEP_MODULES=0)
#     - `KEEP_MODULES=1 npm run release`  -> standalone tarball (COMPLETE)
#   package.tar.gz is deliberately stripped of ALL node_modules and relies on a
#   postinstall to reconstitute them - but that postinstall only restores
#   lib/vscode's product deps + extensions/typescript. It never restores the
#   per-built-in-extension nested deps. That is why a build assembled from
#   package.tar.gz was missing lib/vscode/extensions/git/node_modules/@vscode/
#   fs-copyfile, which the Git extension top-level `require()`s -> Git
#   integration broke on Windows.
#   The only correct fix is to produce the KEEP_MODULES=1 standalone ourselves,
#   which keeps the full, platform-native node_modules (including every built-in
#   extension's nested deps). This is future-proof: new nested deps, native
#   modules, and patches are all handled automatically.
#
# The build runs under MSYS2 because code-server's shell scripts assume a Unix
# environment with rsync/quilt/jq (absent from stock Git Bash). MSYS2 is started
# with `path-type: inherit` so the Windows Node.js and the MSVC toolchain remain
# visible for node-gyp native-module compilation.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "code-server version to build (e.g., 4.127.0)"
        required: true
        type: string
      dry_run:
        description: "Test build without creating release (uploads as artifact instead)"
        required: false
        type: boolean
        default: false
      diagnose:
        description: "Diagnostic mode: install only extensions/copilot with full logging, then stop"
        required: false
        type: boolean
        default: false

permissions:
  contents: write # Required to create releases
  id-token: write # Required for artifact attestation
  attestations: write # Required for artifact attestation

jobs:
  build:
    runs-on: windows-2025
    env:
      VERSION: ${{ inputs.version }}
      PACKAGE_DIR: code-server-${{ inputs.version }}-win32-x64
      ARCHIVE_NAME: code-server-${{ inputs.version }}-win32-x64.tar.gz
      # --- code-server / VS Code build target -------------------------------
      # Consumed by ci/lib.sh, build-vscode.sh and build-release.sh to select
      # the gulp target (vscode-reh-web-win32-x64-min-ci) and the release paths.
      OS: windows
      ARCH: amd64
      VSCODE_ARCH: x64
      VSCODE_TARGET: win32-x64
      npm_config_arch: x64
      # Build native modules from source (no prebuilds) so their .node binaries
      # match this runner's Node ABI and the win32 target. Same flag coder uses.
      npm_config_build_from_source: "true"
      # Keep the build lean and offline-friendly.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # code-server's npm lifecycle scripts (preinstall/postinstall) are bash.
      # npm runs them through cmd.exe on Windows by default, which cannot execute
      # a .sh - so route script execution through bash (resolved from the shell
      # running each npm command; MSYS2 for the build, Git Bash otherwise).
      npm_config_script_shell: bash

    steps:
      - name: Validate version format
        shell: bash
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '$VERSION'. Expected semver (e.g., 4.127.0)"
            exit 1
          fi
          echo "::notice::Building code-server version $VERSION from source (win32-x64)"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::DRY RUN MODE - will upload as artifact instead of creating release"
          fi

      - name: Check if release already exists
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "code-server-windows-v$VERSION" --repo ${{ github.repository }} &>/dev/null; then
            echo "::error::Release code-server-windows-v$VERSION already exists"
            exit 1
          fi

      # code-server's VS Code lives in a git submodule (microsoft/vscode); the
      # patches under patches/ are applied to it via quilt. Check out the exact
      # tag WITH submodules so the pinned VS Code commit comes along.
      - name: Checkout code-server ${{ inputs.version }}
        uses: actions/checkout@v6
        with:
          repository: coder/code-server
          ref: v${{ inputs.version }}
          submodules: true
          path: code-server

      # Build with the Node version code-server pins (.node-version). The build
      # path uses code-server's DEV postinstall (installs lib/vscode deps); it
      # does not run the release postinstall's node-v22 gate, so the pinned
      # version is fine.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: code-server/.node-version

      - name: Upgrade npm
        # windows-2025 ships Visual Studio 2026 (v18). node-gyp only detects it
        # from >= 12.1.0 (bundled in npm >= 11.6.3), so upgrade npm before any
        # native module compiles.
        shell: bash
        run: npm install -g npm@latest

      - name: Locate Visual Studio for VS Code's toolchain check
        # VS Code's lib/vscode/build/npm/preinstall.ts only recognizes VS
        # 2022/2019 and aborts ("Invalid C/C++ Compiler Toolchain") on newer
        # editions. Its env override (`vs2022_install`) is validated with a bare
        # fs.existsSync, so pointing it at the VS actually installed on the
        # runner (2026 on this image) satisfies the check. node-gyp does its own
        # detection (npm >= 11.6.3) and compiles with whatever VS is present.
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { $vsPath = & $vswhere -latest -property installationPath }
          if (-not $vsPath) { Write-Error "No Visual Studio with C++ tools found on the runner"; exit 1 }
          Write-Host "Using Visual Studio at: $vsPath"
          "vs2022_install=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Add Windows SDK signtool to PATH
        # VS Code's win32 reh build strips Authenticode signatures from bundled
        # binaries (rg.exe / tgrep.exe / *.node) with signtool.exe before rcedit.
        # signtool ships in the Windows SDK but is not on PATH by default, so the
        # build fails with `spawn signtool.exe ENOENT`. Put the newest one on PATH.
        shell: pwsh
        run: |
          $sdkBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkBin -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error "signtool.exe not found under $sdkBin"; exit 1 }
          Write-Host "Using signtool: $($signtool.FullName)"
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $signtool.FullName)

      # code-server's scripts (ci/lib.sh, build-vscode.sh, build-release.sh) are
      # bash and call rsync / quilt / jq. Provide them via MSYS2. `path-type:
      # inherit` keeps the Windows Node.js + MSVC toolchain on PATH for node-gyp.
      - name: Exclude build directories from Windows Defender scanning
        # Freshly compiled/downloaded native binaries (rg.exe, tgrep.exe, *.node,
        # node-gyp output) that are executed immediately during the extension
        # installs intermittently crash with 0xC0000409
        # (STATUS_STACK_BUFFER_OVERRUN) when Defender's real-time scanner races
        # their first execution - a different extension each run. Scope Defender
        # exclusions to just the build directories (real-time protection stays on
        # everywhere else) to stop the flake.
        shell: pwsh
        run: |
          $paths = @("${{ github.workspace }}", $env:RUNNER_TEMP, "C:\npm\cache", "C:\msys64")
          foreach ($p in $paths) {
            try { Add-MpPreference -ExclusionPath $p -ErrorAction Stop; Write-Host "excluded: $p" }
            catch { Write-Host "exclusion failed for ${p}: $_" }
          }

      - name: Setup MSYS2 (rsync, quilt, jq for the build scripts)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          path-type: inherit
          release: false
          install: >-
            rsync
            quilt
            jq
            unzip
            zip
            patch
            diffutils
            make

      - name: Apply code-server patches to the VS Code submodule
        shell: msys2 {0}
        working-directory: code-server
        run: |
          # Same as upstream release.yaml `- run: quilt push -a`, applied from
          # the code-server root (QUILT_PATCHES defaults to ./patches).
          quilt push -a
          echo "::notice::Applied $(wc -l < patches/series) patch(es)"

      - name: Diagnose copilot extension install
        if: ${{ inputs.diagnose }}
        shell: msys2 {0}
        working-directory: code-server/lib/vscode/extensions/copilot
        run: |
          # The copilot extension is the only install that hard-crashes
          # (0xC0000409) during the parallel fan-out, and the crash eats stderr.
          # Reproduce it in isolation, decomposed, with foreground/streamed output
          # to pinpoint the faulting step and native binary.
          set -uo pipefail
          echo "===== node/npm/env ====="
          node --version; npm --version; echo "arch=$npm_config_arch build_from_source=$npm_config_build_from_source"

          echo "===== STEP 1: install deps WITHOUT lifecycle scripts ====="
          npm install --ignore-scripts --no-audit --no-fund --foreground-scripts --verbose 2>&1
          s1=$?; echo "STEP1_EXIT=$s1"

          echo "===== @github platform packages resolved ====="
          ls -la node_modules/@github 2>&1 || echo "(no node_modules/@github)"
          echo "--- @github/copilot* dirs ---"
          ls -d node_modules/@github/copilot* 2>&1 || echo "(none)"

          echo "===== @typescript/native-preview (tsgo) presence ====="
          ls -d node_modules/@typescript/native-preview* 2>&1 || echo "(none)"

          echo "===== STEP 2: run copilot's own postinstall the way npm does ====="
          # npm runs `postinstall` (tsx ./script/postinstall.ts) via script-shell.
          # --foreground-scripts streams its output so the last action before a
          # hard crash is visible.
          npm run postinstall --foreground-scripts 2>&1
          s2=$?; echo "STEP2_EXIT=$s2"

          echo "===== DIAGNOSTIC COMPLETE (step1=$s1 step2=$s2) - stopping ====="
          exit 1

      - name: Build code-server and VS Code (win32-x64)
        if: ${{ inputs.diagnose == false }}
        shell: msys2 {0}
        working-directory: code-server
        run: |
          set -euo pipefail

          # 1. VS Code build tooling.
          (cd lib/vscode/build && npm ci)

          # 1b. Serialize the built-in extension installs. VS Code's postinstall
          #     fans out `npm ci` per extension at concurrency min(cpus,8) (=4 on
          #     the runner). Under that contention the heaviest one - copilot,
          #     ~1177 deps - hard-crashes with 0xC0000409; installed on its own it
          #     succeeds fine. There is no env knob, so pin concurrency to 1.
          sed -i 's/Math\.min(os\.cpus()\.length, 8)/1/' lib/vscode/build/npm/postinstall.ts
          grep -q 'const concurrency = 1;' lib/vscode/build/npm/postinstall.ts \
            || { echo "::error::failed to pin extension-install concurrency"; exit 1; }

          # 1c. Fix a bug in code-server's untested Windows branch of
          #     build-vscode.sh: it fixes the remote-cli launcher at
          #     bin/remote-cli/code.cmd, but VS Code's reh build emits it as
          #     bin/remote-cli/${applicationName}.cmd = code-server.cmd. (The
          #     later `copy-bin-script remote-cli/code.cmd` is correct and stays.)
          sed -i 's#fix-bin-script remote-cli/code\.cmd#fix-bin-script remote-cli/code-server.cmd#' ci/build/build-vscode.sh
          grep -q 'fix-bin-script remote-cli/code-server.cmd' ci/build/build-vscode.sh \
            || { echo "::error::failed to patch build-vscode.sh remote-cli bin path"; exit 1; }

          # 2. code-server + submodule deps. The root postinstall
          #    (ci/dev/postinstall.sh) runs `npm ci` inside lib/vscode, which
          #    installs EVERY built-in extension's nested deps - including
          #    lib/vscode/extensions/git/node_modules/@vscode/fs-copyfile - and
          #    compiles native modules for win32.
          #
          #    Native module builds on this Windows/MSYS2 runner are intermittently
          #    flaky - a different native module fails each run (transient
          #    0xC0000409 crashes, build-from-source 127s). Retry with a clean
          #    slate between attempts; the install is deterministic once it lands.
          attempt=1; max=3
          until npm ci; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::npm ci failed after $max attempts"; exit 1
            fi
            echo "::warning::npm ci failed (attempt $attempt/$max); cleaning node_modules and retrying"
            # Remove the trees npm ci populates (keep lib/vscode/build/node_modules,
            # the build tooling, and the tracked concurrency patch). Locks from a
            # crashed process may linger briefly, so pause before retrying.
            rm -rf node_modules \
                   lib/vscode/node_modules \
                   lib/vscode/extensions/node_modules \
                   lib/vscode/extensions/*/node_modules \
                   test/node_modules \
                   test/e2e/extensions/test-extension/node_modules 2>/dev/null || true
            attempt=$((attempt + 1))
            sleep 10
          done

          # 3. Compile code-server (tsc) and the VS Code reh-web bundle for the
          #    win32-x64 target (gulp vscode-reh-web-win32-x64-min-ci).
          npm run build
          VERSION="$VERSION" npm run build:vscode

          # 4. Assemble the COMPLETE release. KEEP_MODULES=1 keeps the full,
          #    win32-native node_modules trees in ./release/lib/vscode - the
          #    exact structure coder ships for Linux/macOS.
          KEEP_MODULES=1 npm run release

      # code-server's npm package has no bundled Node runtime; the app's launcher
      # runs `lib\node.exe out\node\entry.js`, so bundle a matching Windows Node.
      - name: Bundle Windows Node.js runtime
        shell: msys2 {0}
        working-directory: code-server
        run: |
          NODE_FULL_VERSION="$(node --version)"   # e.g. v24.15.0
          NODE_FULL_VERSION="${NODE_FULL_VERSION#v}"
          NODE_URL="https://nodejs.org/dist/v${NODE_FULL_VERSION}/node-v${NODE_FULL_VERSION}-win-x64.zip"
          curl -fsSL "$NODE_URL" -o node-windows.zip
          unzip -q node-windows.zip "node-v${NODE_FULL_VERSION}-win-x64/node.exe"
          mkdir -p release/lib
          mv "node-v${NODE_FULL_VERSION}-win-x64/node.exe" release/lib/node.exe
          rm -rf "node-v${NODE_FULL_VERSION}-win-x64" node-windows.zip
          echo "::notice::Bundled Node.js v${NODE_FULL_VERSION} (win-x64)"

      - name: Stage package with win32-x64 layout
        shell: bash
        working-directory: code-server
        run: |
          set -euo pipefail
          # The app downloads code-server-<v>-win32-x64.tar.gz and expects the
          # archive to contain a top-level dir named code-server-<v>-win32-x64
          # (see getCodeServerSubPathForVersion in src/modules/code-server-module.ts).
          rm -rf "../$PACKAGE_DIR"
          mv release "../$PACKAGE_DIR"

          # Windows launcher: app runs `bin\code-server.cmd`, which execs the
          # bundled node against out/node/entry.js.
          mkdir -p "../$PACKAGE_DIR/bin"
          cat > "../$PACKAGE_DIR/bin/code-server.cmd" << 'LAUNCHER'
          @echo off
          setlocal
          set "SCRIPT_DIR=%~dp0"
          set "ROOT_DIR=%SCRIPT_DIR%.."
          "%ROOT_DIR%\lib\node.exe" "%ROOT_DIR%\out\node\entry.js" %*
          LAUNCHER

      - name: Create tar.gz package
        shell: bash
        run: tar -czf "$ARCHIVE_NAME" "$PACKAGE_DIR"

      - name: Verify package boots in a clean directory
        shell: cmd
        run: |
          :: Extract into a throwaway dir with NO ancestor node_modules and boot
          :: it there via the real launcher - proves the server starts and can
          :: resolve its own runtime dependencies from inside the package alone.
          set "VERIFY_DIR=%RUNNER_TEMP%\cs-verify"
          if exist "%VERIFY_DIR%" rmdir /s /q "%VERIFY_DIR%"
          mkdir "%VERIFY_DIR%"
          tar -xzf "%ARCHIVE_NAME%" -C "%VERIFY_DIR%" || exit /b 1
          "%VERIFY_DIR%\%PACKAGE_DIR%\bin\code-server.cmd" --version || exit /b 1

      - name: Verify build completeness against reference Linux release
        shell: msys2 {0}
        run: |
          set -euo pipefail
          # A build is "complete" when it ships every dependency package that the
          # known-good reference build ships. coder's official Linux standalone
          # for the SAME version is built with KEEP_MODULES=1 and is complete, so
          # it is the authoritative reference. VS Code's JS/extension dependency
          # SET is platform-independent (only the compiled .node binaries differ),
          # so any package present in the Linux tree but absent from ours means an
          # incomplete build. This is general: it catches ANY missing nested dep,
          # not one hardcoded module.
          rm -rf verify && mkdir -p verify/win verify/lin
          tar -xzf "$ARCHIVE_NAME" -C verify/win
          curl -fsSL "https://github.com/coder/code-server/releases/download/v$VERSION/code-server-$VERSION-linux-amd64.tar.gz" -o verify/linux.tar.gz
          tar -xzf verify/linux.tar.gz -C verify/lin

          # Every dependency package is identified by its node_modules/.../package.json.
          pkgset() { ( cd "$1" && find . -type f -name package.json -path '*/node_modules/*' -printf '%P\n' | sed 's#/package.json$##' | sort -u ); }
          pkgset "verify/win/$PACKAGE_DIR" > verify/win.txt
          pkgset "verify/lin/code-server-$VERSION-linux-amd64" > verify/lin.txt

          # Packages the reference has that we are missing (Windows adds windows-*
          # natives, so extras on our side are expected and fine).
          missing="$(comm -23 verify/lin.txt verify/win.txt || true)"
          if [ -n "$missing" ]; then
            echo "::error::Incomplete build - dependency packages present in the reference Linux release but MISSING here:"
            printf '%s\n' "$missing" | sed 's/^/  - /'
            echo "missing count: $(printf '%s\n' "$missing" | grep -c .)"
            exit 1
          fi
          echo "::notice::Completeness OK - all $(grep -c . verify/lin.txt) reference dependency packages are present ($(grep -c . verify/win.txt) total, incl. windows-specific extras)"

      - name: Calculate SHA256 checksum
        id: checksum
        shell: bash
        run: |
          hash=$(sha256sum "$ARCHIVE_NAME" | cut -d' ' -f1)
          echo "sha256=$hash" >> $GITHUB_OUTPUT

      - name: Generate artifact attestation
        if: ${{ inputs.dry_run == false }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ env.ARCHIVE_NAME }}

      - name: Upload artifact (dry run)
        if: ${{ inputs.dry_run == true }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          TAG="code-server-windows-v$VERSION"
          BUNDLED_NODE_VERSION=$("$PACKAGE_DIR/lib/node.exe" --version)

          cat > release-notes.md << 'EOF'
          ## code-server $VERSION for Windows

          Standalone Windows build of [code-server $VERSION](https://github.com/coder/code-server/releases/tag/v$VERSION),
          built from source with `KEEP_MODULES=1` so the package matches the
          structure of coder's official Linux/macOS releases (complete, native
          node_modules including every built-in extension's nested dependencies).

          ### Contents

          - code-server $VERSION (VS Code reh-web, win32-x64)
          - Node.js $NODE_VERSION (bundled)

          ### Usage

          ```powershell
          bin\code-server.cmd --help
          ```

          ### Checksums

          **SHA256:**
          ```
          $SHA256  $ARCHIVE_NAME
          ```

          ### Supply Chain Security

          This release includes an artifact attestation.
          Verify with: `gh attestation verify $ARCHIVE_NAME --repo ${{ github.repository }}`

          ### License

          code-server is licensed under the MIT License. See included LICENSE file.
          Node.js is also MIT licensed.
          EOF

          sed -i "s/\$VERSION/$VERSION/g" release-notes.md
          sed -i "s/\$ARCHIVE_NAME/$ARCHIVE_NAME/g" release-notes.md
          sed -i "s/\$SHA256/$SHA256/g" release-notes.md
          sed -i "s/\$NODE_VERSION/$BUNDLED_NODE_VERSION/g" release-notes.md

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "code-server $VERSION for Windows" \
            --notes-file release-notes.md \
            --latest=false \
            "$ARCHIVE_NAME"

      - name: Summary
        shell: bash
        env:
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          BUNDLED_NODE_VERSION=$("$PACKAGE_DIR/lib/node.exe" --version)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::DRY RUN complete - Package: $ARCHIVE_NAME, Node: $BUNDLED_NODE_VERSION, SHA256: $SHA256"
          else
            echo "::notice::Release created: code-server-windows-v$VERSION - Package: $ARCHIVE_NAME, Node: $BUNDLED_NODE_VERSION, SHA256: $SHA256"
          fi
